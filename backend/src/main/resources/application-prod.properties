# MRRG Backend - Production Profile
# This profile is loaded when SPRING_PROFILES_ACTIVE=prod
# All values are read from environment variables for security

# ========== SERVER ==========
server.port=4000

# ========== DATABASE (Production) ==========
# Read from environment variables - no defaults for security
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ========== JPA/HIBERNATE (Production) ==========
# IMPORTANT: For production, use 'validate' instead of 'update'
# - This mode intentionally defaults to 'validate' for safety
# - Production deployment assumes schema already exists or migrations are handled externally
# - Flyway or Liquibase can be introduced before final production deployment if required
# - With 'validate', Hibernate will check that the database schema matches entity definitions
#   but will NOT automatically create or modify tables
# - See deployment documentation for schema initialization strategy
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Production: schema migrations must be applied separately before startup
app.database-schema-updater.enabled=false

# ========== LOGGING (Production) ==========
# Reduce verbosity in production
logging.level.root=WARN
logging.level.com.mrrg=INFO

# ========== MAIL (Production SMTP) ==========
# Read SMTP configuration from environment variables
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.from=${SPRING_MAIL_FROM}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

# ========== FIREBASE ==========
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH}

# ========== ACCOUNT ACTIVATION ==========
app.activation-token-expiration-hours=${ACTIVATION_TOKEN_EXPIRATION_HOURS:24}
app.activation-link-base-url=${ACTIVATION_LINK_BASE_URL}

# ========== CORS (Production) ==========
# CORS is configured in SecurityConfig via FRONTEND_ORIGIN environment variable
# See backend/src/main/java/com/mrrg/backend/config/SecurityConfig.java
app.cors.allowed-origins=${FRONTEND_ORIGIN}

# ========== JWT (Production) ==========
# Production JWT signing secret must be provided via JWT_SECRET environment variable
# No fallback to hardcoded default for security
jwt.secret=${JWT_SECRET}

# Production Notes:
# 
# 1. Database Migrations:
#    - Set SPRING_JPA_HIBERNATE_DDL_AUTO=validate (or remove to use default)
#    - Implement database versioning strategy before production:
#      * Option 1: Flyway (recommended for Spring Boot)
#      * Option 2: Liquibase
#      * Option 3: Manual versioned SQL scripts
#    - Migrations must be tested in staging before production
# 
# 2. Security:
#    - All secrets must come from environment variables (.env file)
#    - Never hardcode passwords or API keys
#    - Use strong, randomly generated values
#    - Rotate secrets regularly
# 
# 3. Email:
#    - Configure with production SMTP provider
#    - Test email delivery in staging environment
#    - Monitor bounce and delivery rates
# 
# 4. Logging:
#    - Production uses WARN level to reduce noise
#    - Application logs (com.mrrg) at INFO level
#    - Consider centralized logging (ELK, Splunk) for production
