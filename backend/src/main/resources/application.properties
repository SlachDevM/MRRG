server.port=4000
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/mrrg}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mrrg}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mrrgpass}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# Account activation configuration
app.activation-token-expiration-hours=${ACTIVATION_TOKEN_EXPIRATION_HOURS:24}
app.activation-link-base-url=${ACTIVATION_LINK_BASE_URL:mrrg://activate-account}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
