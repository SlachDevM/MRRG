server.port=4000
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/mrrg}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mrrg}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mrrgpass}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.from=noreply@mrrg.local

spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# Account activation configuration
app.activation-token-expiration-hours=${ACTIVATION_TOKEN_EXPIRATION_HOURS:24}
app.activation-link-base-url=${ACTIVATION_LINK_BASE_URL:mrrg://activate-account}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# CORS configuration (local development defaults)
app.cors.allowed-origins=${FRONTEND_ORIGIN:http://localhost:3000,http://localhost:80,http://localhost}

# JWT configuration (local development uses hardcoded default for backward compatibility)
jwt.secret=${JWT_SECRET:MySuperSecretKeyForMRRGAppThatIsVeryLongAndSecure123456789}
