services:
  backend:
    build: ./backend
    ports:
      - '4000:4000'
    restart: unless-stopped
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mrrg
      - SPRING_DATASOURCE_USERNAME=mrrg
      - SPRING_DATASOURCE_PASSWORD=mrrgpass
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/firebase-service-account.json
    volumes:
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - '3000:80'
    restart: unless-stopped
    depends_on:
      - backend

  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: mrrg
      POSTGRES_USER: mrrg
      POSTGRES_PASSWORD: mrrgpass
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
