services:
  backend:
    build: ./backend
    ports:
      - '4000:4000'
    restart: unless-stopped
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mrrg
      - SPRING_DATASOURCE_USERNAME=mrrg
      - SPRING_DATASOURCE_PASSWORD=mrrgpass
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - APP_DATABASE_SCHEMA_UPDATER_ENABLED=true
      - JWT_SECRET=local-dev-secret-change-me
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/firebase-service-account.json
      - SPRING_MAIL_HOST=mailpit
      - SPRING_MAIL_PORT=1025
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=false
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=false
      - SPRING_MAIL_USERNAME=
      - SPRING_MAIL_PASSWORD=
      - SPRING_MAIL_FROM=noreply@mrrg.local
      - FRONTEND_ORIGIN=http://localhost:3000
      - ACTIVATION_LINK_BASE_URL=http://localhost:3000/activate-account
      - SPRING_PROFILES_ACTIVE=prod
      - INITIAL_ADMIN_EMAIL=admin@mrrg.local
      - INITIAL_ADMIN_PASSWORD=test
      - INITIAL_ADMIN_NAME=Administrator
      - APP_BOOTSTRAP_INITIAL_ADMIN_ENABLED=true
    volumes:
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      - postgres
      - mailpit

  frontend:
    build: ./frontend
    ports:
      - '3000:80'
    restart: unless-stopped
    depends_on:
      - backend

  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: mrrg
      POSTGRES_USER: mrrg
      POSTGRES_PASSWORD: mrrgpass
    volumes:
      - pgdata:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: mrrg-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
      
volumes:
  pgdata: